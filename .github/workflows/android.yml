name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build UI APK
      run: ./gradlew :ui:assembleDebug --no-daemon --stacktrace
      continue-on-error: true
      id: ui_build

    - name: Build Tunnel APK
      run: ./gradlew :tunnel:assembleDebug --no-daemon --stacktrace
      continue-on-error: true
      id: tunnel_build

    - name: List APK outputs
      run: |
        echo "=== UI APK ==="
        find ui/build -name "*.apk" -type f 2>/dev/null || echo "No UI APK found"
        echo "=== Tunnel APK ==="
        find tunnel/build -name "*.apk" -type f 2>/dev/null || echo "No Tunnel APK found"
        echo "=== All APKs ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APKs found"

    - name: Upload UI APK
      if: steps.ui_build.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: wireguard-ui-debug
        path: ui/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: ignore

    - name: Upload Tunnel APK
      if: steps.tunnel_build.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: wireguard-tunnel-debug
        path: tunnel/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: ignore
