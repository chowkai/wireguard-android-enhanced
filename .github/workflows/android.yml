name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Initialize submodules
      run: git submodule update --init --recursive

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon --stacktrace
      id: release_build

    - name: List APK outputs
      run: |
        echo "=== All APKs ==="
        find . -name "*.apk" -type f 2>/dev/null | head -20

    - name: List APK outputs
      run: |
        echo "=== UI APK ==="
        find ui/build -name "*.apk" -type f 2>/dev/null || echo "No UI APK found"
        echo "=== Tunnel APK ==="
        find tunnel/build -name "*.apk" -type f 2>/dev/null || echo "No Tunnel APK found"
        echo "=== All APKs ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APKs found"

    - name: Find and Upload APKs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: wireguard-apks
        path: |
          **/build/outputs/apk/**/*.apk
          **/build/outputs/**/*.apk
        retention-days: 30
        if-no-files-found: warn
# Trigger rebuild
