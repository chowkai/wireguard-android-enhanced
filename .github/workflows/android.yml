name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle (allow failures for debugging)
      run: ./gradlew assembleDebug --stacktrace --info
      continue-on-error: true
      id: build_attempt

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: |
          **/build/*.log
          build/reports/**/*.log
        retention-days: 7

    - name: Upload APK (if success)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload tunnel APK (if success)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: tunnel-debug
        path: tunnel/build/outputs/apk/debug/tunnel-debug.apk
        retention-days: 30
