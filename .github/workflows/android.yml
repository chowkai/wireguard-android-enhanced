name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Enable KVM group perms (for emulator if needed)
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace --info --no-daemon
      id: build_attempt

    - name: Upload build log on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: |
          **/build/*.log
          build/reports/**/*.log
        retention-days: 7

    - name: Upload UI APK (if success)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: wireguard-ui-debug
        path: ui/build/outputs/apk/debug/ui-debug.apk
        retention-days: 30

    - name: Upload tunnel APK (if success)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: wireguard-tunnel-debug
        path: tunnel/build/outputs/apk/debug/tunnel-debug.apk
        retention-days: 30
